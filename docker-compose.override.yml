# Automatically merged by Docker Compose for local development.
# Uses SQLite (no postgres), dummy SMTP, and relaxed CORS for localhost.
# Do NOT commit this file if it contains real secrets.

services:
  db:
    profiles: ["prod-only"]   # exclude db service from local dev (using SQLite)

  migrate:
    env_file: backend/.env
    depends_on: []             # no postgres dependency in local dev

  backend:
    env_file: backend/.env
    environment:
      UPLOAD_DIR: /app/uploads   # override the relative path in .env for the container
    depends_on:
      migrate:
        condition: service_completed_successfully
